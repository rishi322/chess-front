<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    #animateSquare {
      width: 50px;
      height: 50px;
      background-color: blue;
      position: absolute;
      transition: transform 0.5s ease-in-out, background-color 0.5s ease-in-out;
    }
  </style>
</head>
<body>

<div id="animateSquare"></div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const square = document.getElementById('animateSquare');

    document.addEventListener('click', function (event) {
      // Get the coordinates of the click
      const x = event.clientX;
      const y = event.clientY;

      // Set the new position and color of the square
      square.style.transform = `translate(${x - 25}px, ${y - 25}px)`;
      square.style.backgroundColor = 'red';

      // Reset the color after a short delay (e.g., 500 milliseconds)
      setTimeout(() => {
        square.style.backgroundColor = 'black';
      }, 500);
    });
  });
</script>

</body>
</html>
